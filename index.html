<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CFB Top 25 Builder</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f85149;
    --accent-soft: rgba(248, 81, 73, 0.12);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  h1 { margin: 0; font-size: 20px; font-weight: 700; }
  .subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 16px;
    padding: 16px;
    height: calc(100vh - 73px);
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel h2 {
    margin: 0 0 10px 0;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .rankings { overflow-y: auto; padding-right: 4px; flex: 1; }
  .slot {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    min-height: 56px;
    transition: background 0.1s, border-color 0.1s;
  }
  .slot.drag-over { background: var(--accent-soft); border-color: var(--accent); }
  .slot.empty { background: transparent; }
  .rank {
    width: 30px;
    text-align: right;
    color: var(--muted);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    font-size: 14px;
    padding-right: 4px;
  }
  .slot-content { flex: 1; min-height: 48px; display: flex; align-items: center; }
  .tile {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: grab;
    width: 100%;
    min-height: 48px;
    user-select: none;
    transition: transform 0.05s, box-shadow 0.1s;
  }
  .tile:hover { border-color: #484f58; }
  .tile:active { cursor: grabbing; }
  .tile.dragging { opacity: 0.35; }
  .tile .logo, .tile .fallback {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }
  .tile .logo { object-fit: contain; }
  .tile .fallback {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #30363d;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .tile .name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tile .conf {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .tile .text { display: flex; flex-direction: column; min-width: 0; flex: 1; }
  .pool-wrap { min-height: 0; }
  .pool {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 8px;
    align-content: start;
    overflow-y: auto;
    padding-right: 4px;
    flex: 1;
  }
  .pool.drag-over { outline: 2px dashed var(--accent); outline-offset: -6px; border-radius: 6px; }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  input[type="text"] {
    flex: 1;
    padding: 8px 10px;
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  button {
    padding: 8px 14px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }
  button:hover { background: #30363d; }
  .count { font-size: 11px; color: var(--muted); margin-left: 6px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; height: auto; }
  }
</style>
</head>

  </div>
  <div style="display:flex; align-items:center; gap:8px; margin-left:auto;">
    <input type="text" id="name" placeholder="Your name" autocomplete="off" style="width:140px;">
  </div>
  <div style="display:flex; gap:8px;">

</header>

function logoUrl(team) {
  return `https://a.espncdn.com/i/teamlogos/ncaa/500/${team.espn}.png`;
}

function buildTile(team) {
  const tile = document.createElement("div");
  tile.className = "tile";
  tile.draggable = true;
  tile.dataset.teamId = team.id;

  const img = document.createElement("img");
  img.className = "logo";
  img.src = logoUrl(team);
  img.alt = "";
  img.loading = "lazy";
  img.onerror = () => {
    const fallback = document.createElement("div");
    fallback.className = "fallback";
    fallback.textContent = team.abbr;
    img.replaceWith(fallback);
  };
  tile.appendChild(img);

  const text = document.createElement("div");
  text.className = "text";
  const name = document.createElement("div");
  name.className = "name";
  name.textContent = team.name;
  const conf = document.createElement("div");
  conf.className = "conf";
  conf.textContent = team.conf;
  text.appendChild(name);
  text.appendChild(conf);
  tile.appendChild(text);

  tile.addEventListener("dragstart", onDragStart);
  tile.addEventListener("dragend", onDragEnd);
  tile.addEventListener("dblclick", onTileDoubleClick);
  return tile;
}

function onTileDoubleClick() {
  const teamId = this.dataset.teamId;
  const idx = rankings.indexOf(teamId);
  if (idx >= 0) {
    rankings[idx] = null;
  } else {
    const empty = rankings.indexOf(null);
    if (empty < 0) return;
    rankings[empty] = teamId;
  }
  save();
  renderRankings();
  renderPool();
}

function onDragStart(e) {
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", this.dataset.teamId);
  this.classList.add("dragging");
}
function onDragEnd() {
  this.classList.remove("dragging");
  document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
}

function renderRankings() {
  const container = document.getElementById("rankings");
  container.innerHTML = "";
  for (let i = 0; i < SLOTS; i++) {
    const slot = document.createElement("div");
    slot.className = "slot" + (rankings[i] ? "" : " empty");
    slot.dataset.slotIndex = i;

    const rank = document.createElement("div");
    rank.className = "rank";
    rank.textContent = i + 1;
    slot.appendChild(rank);

    const content = document.createElement("div");
    content.className = "slot-content";
    if (rankings[i]) {
      const team = teamMap.get(rankings[i]);
      if (team) content.appendChild(buildTile(team));
    }
    slot.appendChild(content);

    slot.addEventListener("dragover", (e) => { e.preventDefault(); slot.classList.add("drag-over"); });
    slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
    slot.addEventListener("drop", onSlotDrop);

    container.appendChild(slot);
  }
  updateCounts();
}

function renderPool() {
  const pool = document.getElementById("pool");
  pool.innerHTML = "";
  const ranked = new Set(rankings.filter(Boolean));
  const filter = document.getElementById("search").value.trim().toLowerCase();

  TEAMS.filter(t => !ranked.has(t.id))
    .filter(t => !filter || t.name.toLowerCase().includes(filter) || t.conf.toLowerCase().includes(filter) || t.abbr.toLowerCase().includes(filter))
    .sort((a, b) => a.name.localeCompare(b.name))
    .forEach(t => pool.appendChild(buildTile(t)));

  updateCounts();
}

function updateCounts() {
  const filled = rankings.filter(Boolean).length;
  document.getElementById("rank-count").textContent = `(${filled}/${SLOTS})`;
  document.getElementById("pool-count").textContent = `(${TEAMS.length - filled})`;
}

function onSlotDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  this.classList.remove("drag-over");
  const teamId = e.dataTransfer.getData("text/plain");
  if (!teamId) return;
  const targetIdx = Number(this.dataset.slotIndex);
  const sourceIdx = rankings.indexOf(teamId);
  const occupant = rankings[targetIdx];

  if (sourceIdx === targetIdx) return;
  if (sourceIdx >= 0) {
    // Reordering within rankings: swap.
    rankings[sourceIdx] = occupant;
    rankings[targetIdx] = teamId;
  } else {
    // Coming from pool: place; if occupied, displaced team returns to pool.
    rankings[targetIdx] = teamId;
  }
  save();
  renderRankings();
  renderPool();
}

function onPoolDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  this.classList.remove("drag-over");
  const teamId = e.dataTransfer.getData("text/plain");
  if (!teamId) return;
  const idx = rankings.indexOf(teamId);
  if (idx >= 0) {
    rankings[idx] = null;
    save();
    renderRankings();
    renderPool();
  }
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(rankings)); } catch {}
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length === SLOTS) {
        rankings = parsed.map(id => (id && teamMap.has(id)) ? id : null);
      }
    }
    userName = localStorage.getItem(NAME_KEY) || "";
  } catch {}
}

function titleText() {
  return userName.trim()
    ? `${userName.trim()}'s College Football Top 25`
    : "College Football Top 25 Builder";
}

function updateTitle() {
  document.getElementById("title").textContent = titleText();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function loadLogo(team) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = logoUrl(team);
  });
}

async function exportImage() {
  const btn = document.getElementById("share");
  const original = btn.textContent;
  btn.textContent = "Rendering…";
  btn.disabled = true;
  try {
    const W = 1080, H = 608;
    const canvas = document.createElement("canvas");
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#0d1117";
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = "#e6edf3";
    ctx.font = "700 26px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    ctx.textBaseline = "middle";
    ctx.textAlign = "left";
    ctx.fillText(titleText(), 24, 38);

    ctx.fillStyle = "#8b949e";
    ctx.font = "500 12px -apple-system, BlinkMacSystemFont, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(new Date().toLocaleDateString(), W - 24, 38);

    ctx.fillStyle = "#f85149";
    ctx.fillRect(24, 64, 64, 3);

    const padX = 24;
    const gridTop = 84;
    const gridBottom = H - 20;
    const cols = 5, rows = 5, gap = 8;
    const cellW = (W - padX * 2 - gap * (cols - 1)) / cols;
    const cellH = (gridBottom - gridTop - gap * (rows - 1)) / rows;

    const logos = await Promise.all(rankings.map(id => id ? loadLogo(teamMap.get(id)) : null));

    for (let i = 0; i < 25; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = padX + col * (cellW + gap);
      const y = gridTop + row * (cellH + gap);

      ctx.fillStyle = "#161b22";
      ctx.strokeStyle = "#30363d";
      ctx.lineWidth = 1;
      roundRect(ctx, x, y, cellW, cellH, 8);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#f85149";
      ctx.font = "700 18px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.textBaseline = "top";
      ctx.textAlign = "left";
      ctx.fillText(String(i + 1), x + 10, y + 8);

      const teamId = rankings[i];
      if (!teamId) continue;
      const team = teamMap.get(teamId);

      const logoSize = 52;
      const logoX = x + cellW / 2 - logoSize / 2;
      const logoY = y + 18;
      const logo = logos[i];
      if (logo) {
        ctx.drawImage(logo, logoX, logoY, logoSize, logoSize);
      } else {
        ctx.fillStyle = "#30363d";
        roundRect(ctx, logoX, logoY, logoSize, logoSize, 6);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = "700 13px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(team.abbr, logoX + logoSize / 2, logoY + logoSize / 2);
      }

      ctx.fillStyle = "#e6edf3";
      ctx.font = "600 12px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      let name = team.name;
      const maxWidth = cellW - 12;
      if (ctx.measureText(name).width > maxWidth) {
        while (name.length > 1 && ctx.measureText(name + "…").width > maxWidth) name = name.slice(0, -1);
        name += "…";
      }
      ctx.fillText(name, x + cellW / 2, logoY + logoSize + 6);
    }

    await new Promise((resolve) => {
      canvas.toBlob((blob) => {
        if (!blob) { alert("Export failed"); resolve(); return; }
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "cfb-top25.png";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        resolve();
      }, "image/png");
    });
  } finally {
    btn.textContent = original;
    btn.disabled = false;
  }
}

function init() {
  load();
  updateTitle();
  const nameInput = document.getElementById("name");
  nameInput.value = userName;
  nameInput.addEventListener("input", () => {
    userName = nameInput.value;
    try { localStorage.setItem(NAME_KEY, userName); } catch {}
    updateTitle();
  });
  renderRankings();
  renderPool();

  const pool = document.getElementById("pool");
  pool.addEventListener("dragover", (e) => { e.preventDefault(); pool.classList.add("drag-over"); });
  pool.addEventListener("dragleave", (e) => { if (e.target === pool) pool.classList.remove("drag-over"); });
  pool.addEventListener("drop", onPoolDrop);

  document.getElementById("search").addEventListener("input", renderPool);

  document.getElementById("reset").addEventListener("click", () => {
    if (!confirm("Clear your Top 25?")) return;
    rankings = new Array(SLOTS).fill(null);
    save();
    renderRankings();
    renderPool();
  });

  document.getElementById("share").addEventListener("click", exportImage);

  document.getElementById("copy").addEventListener("click", async () => {
    const lines = rankings.map((id, i) => {
      const t = id ? teamMap.get(id) : null;
      return `${i + 1}. ${t ? t.name : "—"}`;
    }).join("\n");
    try {
      await navigator.clipboard.writeText(lines);
      const btn = document.getElementById("copy");
      const original = btn.textContent;
      btn.textContent = "Copied!";
      setTimeout(() => { btn.textContent = original; }, 1200);
    } catch {
      alert(lines);
    }
  });
}
init();
</script>
