<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CFB Top 25 Builder</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f85149;
    --accent-soft: rgba(248, 81, 73, 0.12);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-info { flex: 1 1 320px; min-width: 0; }
  .header-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .header-controls input { width: 140px; }
  h1 { margin: 0; font-size: 20px; font-weight: 700; }
  .subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 16px;
    padding: 16px;
    height: calc(100vh - 73px);
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel h2 {
    margin: 0 0 10px 0;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .rankings { overflow-y: auto; padding-right: 4px; flex: 1; }
  .slot {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    min-height: 56px;
    transition: background 0.1s, border-color 0.1s;
  }
  .slot.drag-over { background: var(--accent-soft); border-color: var(--accent); }
  .slot.empty { background: transparent; }
  .rank {
    width: 30px;
    text-align: right;
    color: var(--muted);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    font-size: 14px;
    padding-right: 4px;
  }
  .slot-content { flex: 1; min-height: 48px; display: flex; align-items: center; gap: 6px; min-width: 0; }
  .slot-actions { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
  .slot:hover .slot-actions { opacity: 1; }
  .slot-action {
    width: 26px; height: 22px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; line-height: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--muted);
  }
  .slot-action:hover:not(:disabled) { background: #30363d; color: var(--text); }
  .slot-action:disabled { opacity: 0.3; cursor: not-allowed; }
  .tile {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: grab;
    width: 100%;
    flex: 1 1 0;
    min-width: 0;
    min-height: 48px;
    user-select: none;
    touch-action: manipulation;
    transition: transform 0.05s, box-shadow 0.1s;
  }
  .tile:hover { border-color: #484f58; }
  .tile:active { cursor: grabbing; }
  .tile.dragging { opacity: 0.35; }
  .tile .logo, .tile .fallback {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }
  .tile .logo { object-fit: contain; }
  .tile .fallback {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #30363d;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .tile .name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tile .conf {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .tile .text { display: flex; flex-direction: column; min-width: 0; flex: 1; }
  .pool-wrap { min-height: 0; }
  .right-stack { display: flex; flex-direction: column; gap: 16px; min-height: 0; overflow: hidden; }
  .playoff-wrap, .pool-wrap { flex: 1; min-height: 0; }
  .hint { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--muted); font-size: 11px; margin-left: 8px; }
  .bracket {
    display: grid;
    grid-template-columns: 1.1fr 1.1fr 1fr 0.85fr;
    gap: 10px;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .round {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    gap: 6px;
    min-height: 0;
  }
  .round-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    text-align: center;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .matchup {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
  }
  .matchup-slot {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    min-height: 26px;
    transition: background 0.1s;
  }
  .matchup-slot:not(.empty):hover { background: rgba(255,255,255,0.05); }
  .matchup-slot.winner { background: rgba(248, 81, 73, 0.22); box-shadow: inset 2px 0 0 var(--accent); }
  .matchup-slot.empty { color: var(--muted); cursor: default; font-style: italic; }
  .matchup-slot .seed { width: 16px; color: var(--muted); font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; text-align: right; font-size: 10px; }
  .matchup-slot.winner .seed { color: var(--accent); }
  .matchup-slot img.mini, .matchup-slot .mini-fallback {
    width: 18px; height: 18px; flex-shrink: 0; object-fit: contain;
  }
  .matchup-slot .mini-fallback {
    background: #30363d; border-radius: 3px; display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: #fff;
  }
  .matchup-slot .mname { font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .matchup-slot .badge {
    font-size: 8px; color: var(--accent); font-weight: 700; padding: 1px 4px;
    border: 1px solid var(--accent); border-radius: 3px; flex-shrink: 0;
  }
  .trophy { text-align: center; font-size: 12px; color: var(--accent); font-weight: 700; padding: 8px 4px 0; }
  .pool {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 8px;
    align-content: start;
    overflow-y: auto;
    padding-right: 4px;
    flex: 1;
  }
  .pool.drag-over { outline: 2px dashed var(--accent); outline-offset: -6px; border-radius: 6px; }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  input[type="text"] {
    flex: 1;
    padding: 8px 10px;
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  button {
    padding: 8px 14px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }
  button:hover { background: #30363d; }
  .count { font-size: 11px; color: var(--muted); margin-left: 6px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }

  @media (pointer: coarse) {
    .slot-actions { opacity: 1; }
    .tile { cursor: pointer; }
  }

  @media (max-width: 900px) {
    header { padding: 12px 14px; gap: 10px; }
    h1 { font-size: 17px; }
    .subtitle { font-size: 11px; line-height: 1.35; }
    .header-controls { width: 100%; }
    .header-controls input { flex: 1 1 100%; width: auto; }
    .header-controls button { flex: 1; padding: 10px 6px; font-size: 12px; min-width: 0; }

    .layout {
      grid-template-columns: 1fr;
      height: auto;
      padding: 10px;
      gap: 10px;
    }
    .right-stack { overflow: visible; gap: 10px; }
    .panel { max-height: 78vh; }
    .playoff-wrap, .pool-wrap { flex: none; min-height: 0; }
    .panel h2 { font-size: 11px; margin-bottom: 8px; }
    .hint { display: block; margin-left: 0; margin-top: 2px; }

    .bracket {
      grid-template-columns: 170px 170px 170px 150px;
      overflow-x: auto;
      overflow-y: auto;
      gap: 6px;
    }
    .matchup-slot { min-height: 30px; font-size: 12px; }

    .pool { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .tile { min-height: 52px; }
    .tile .name { font-size: 12px; }
    .slot-actions { opacity: 1; }
    .slot-action { width: 30px; height: 26px; font-size: 10px; }
  }

  @media (max-width: 480px) {
    header { padding: 10px 12px; }
    .layout { padding: 8px; }
    .panel { padding: 10px; max-height: 80vh; }
    .pool { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

const STORAGE_KEY = "cfb-top25-rankings-v1";
const NAME_KEY = "cfb-top25-name-v1";
const ADVANCEMENT_KEY = "cfb-top25-advancement-v1";
const SLOTS = 25;
const P4 = ["ACC", "Big Ten", "Big 12", "SEC"];
const G6 = ["AAC", "MW", "MAC", "Sun Belt", "C-USA", "Pac-12"];
let userName = "";
let advancement = { r1: [null, null, null, null], qf: [null, null, null, null], sf: [null, null], champ: [null] };

const teamMap = new Map(TEAMS.map(t => [t.id, t]));
let rankings = new Array(SLOTS).fill(null);

function logoUrl(team) {
  return `https://a.espncdn.com/i/teamlogos/ncaa/500/${team.espn}.png`;
}

function buildTile(team) {
  const tile = document.createElement("div");
  tile.className = "tile";
  tile.draggable = true;
  tile.dataset.teamId = team.id;

  const img = document.createElement("img");
  img.className = "logo";
  img.src = logoUrl(team);
  img.alt = "";
  img.loading = "lazy";
  img.onerror = () => {
    const fallback = document.createElement("div");
    fallback.className = "fallback";
    fallback.textContent = team.abbr;
    img.replaceWith(fallback);
  };
  tile.appendChild(img);

  const text = document.createElement("div");
  text.className = "text";
  const name = document.createElement("div");
  name.className = "name";
  name.textContent = team.name;
  const conf = document.createElement("div");
  conf.className = "conf";
  conf.textContent = team.conf;
  text.appendChild(name);
  text.appendChild(conf);
  tile.appendChild(text);

  tile.addEventListener("dragstart", onDragStart);
  tile.addEventListener("dragend", onDragEnd);
  tile.addEventListener("click", onTileClick);
  tile.addEventListener("dblclick", onTileDoubleClick);
  return tile;
}

function isTouchDevice() {
  return window.matchMedia("(pointer: coarse)").matches;
}

function toggleTeam(teamId) {
  const idx = rankings.indexOf(teamId);
  if (idx >= 0) {
    rankings[idx] = null;
  } else {
    const empty = rankings.indexOf(null);
    if (empty < 0) return;
    rankings[empty] = teamId;
  }
  save();
  renderRankings();
  renderPool();
}

function onTileClick(e) {
  if (e.target.closest(".slot-action")) return;
  // Single-tap toggle is the touch-device behavior. Desktop uses drag/dblclick.
  if (!isTouchDevice()) return;
  e.preventDefault();
  toggleTeam(this.dataset.teamId);
}

function onTileDoubleClick(e) {
  if (e.target.closest(".slot-action")) return;
  // On touch the click handler already fired; skip to avoid a second toggle.
  if (isTouchDevice()) return;
  toggleTeam(this.dataset.teamId);
}

function buildSlotActions(slotIdx) {
  const wrap = document.createElement("div");
  wrap.className = "slot-actions";

  const up = document.createElement("button");
  up.type = "button";
  up.className = "slot-action";
  up.textContent = "▲";
  up.title = "Move up";
  up.disabled = slotIdx === 0;
  up.addEventListener("click", (e) => { e.stopPropagation(); moveRanked(slotIdx, -1); });

  const down = document.createElement("button");
  down.type = "button";
  down.className = "slot-action";
  down.textContent = "▼";
  down.title = "Move down";
  down.disabled = slotIdx === SLOTS - 1;
  down.addEventListener("click", (e) => { e.stopPropagation(); moveRanked(slotIdx, 1); });

  wrap.append(up, down);
  return wrap;
}

function moveRanked(idx, dir) {
  const target = idx + dir;
  if (target < 0 || target >= SLOTS) return;
  const tmp = rankings[target];
  rankings[target] = rankings[idx];
  rankings[idx] = tmp;
  save();
  renderRankings();
  renderPool();
}

function onDragStart(e) {
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", this.dataset.teamId);
  this.classList.add("dragging");
}
function onDragEnd() {
  this.classList.remove("dragging");
  document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
}

function renderRankings() {
  const container = document.getElementById("rankings");
  container.innerHTML = "";
  for (let i = 0; i < SLOTS; i++) {
    const slot = document.createElement("div");
    slot.className = "slot" + (rankings[i] ? "" : " empty");
    slot.dataset.slotIndex = i;

    const rank = document.createElement("div");
    rank.className = "rank";
    rank.textContent = i + 1;
    slot.appendChild(rank);

    const content = document.createElement("div");
    content.className = "slot-content";
    if (rankings[i]) {
      const team = teamMap.get(rankings[i]);
      if (team) {
        content.appendChild(buildTile(team));
        content.appendChild(buildSlotActions(i));
      }
    }
    slot.appendChild(content);

    slot.addEventListener("dragover", (e) => { e.preventDefault(); slot.classList.add("drag-over"); });
    slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
    slot.addEventListener("drop", onSlotDrop);

    container.appendChild(slot);
  }
  updateCounts();
  renderBracket();
}

function renderPool() {
  const pool = document.getElementById("pool");
  pool.innerHTML = "";
  const ranked = new Set(rankings.filter(Boolean));
  const filter = document.getElementById("search").value.trim().toLowerCase();

  TEAMS.filter(t => !ranked.has(t.id))
    .filter(t => !filter || t.name.toLowerCase().includes(filter) || t.conf.toLowerCase().includes(filter) || t.abbr.toLowerCase().includes(filter))
    .sort((a, b) => a.name.localeCompare(b.name))
    .forEach(t => pool.appendChild(buildTile(t)));

  updateCounts();
}

function updateCounts() {
  const filled = rankings.filter(Boolean).length;
  document.getElementById("rank-count").textContent = `(${filled}/${SLOTS})`;
  document.getElementById("pool-count").textContent = `(${TEAMS.length - filled})`;
}

function onSlotDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  this.classList.remove("drag-over");
  const teamId = e.dataTransfer.getData("text/plain");
  if (!teamId) return;
  const targetIdx = Number(this.dataset.slotIndex);
  const sourceIdx = rankings.indexOf(teamId);
  const occupant = rankings[targetIdx];

  if (sourceIdx === targetIdx) return;
  if (sourceIdx >= 0) {
    // Reordering within rankings: swap.
    rankings[sourceIdx] = occupant;
    rankings[targetIdx] = teamId;
  } else {
    // Coming from pool: place; if occupied, displaced team returns to pool.
    rankings[targetIdx] = teamId;
  }
  save();
  renderRankings();
  renderPool();
}

function onPoolDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  this.classList.remove("drag-over");
  const teamId = e.dataTransfer.getData("text/plain");
  if (!teamId) return;
  const idx = rankings.indexOf(teamId);
  if (idx >= 0) {
    rankings[idx] = null;
    save();
    renderRankings();
    renderPool();
  }
}

// No persistence — every page load starts with a blank board so each visit
// is independent. Clear any state written by earlier versions of the site.
function save() {}
function saveAdvancement() {}
function load() {
  try {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(NAME_KEY);
    localStorage.removeItem(ADVANCEMENT_KEY);
  } catch {}
}

// Compute the 12-team CFP field from the current Top 25.
// Rules: 4 P4 conf champs (highest-ranked team per conference) + 1 G6 champ
// (highest-ranked Group of 6 team) + 7 at-large picks. Top 4 seeds get byes.
function buildBracket() {
  const ranked = rankings.filter(Boolean).map(id => teamMap.get(id)).filter(Boolean);
  const champByConf = new Map();
  for (const t of ranked) if (!champByConf.has(t.conf)) champByConf.set(t.conf, t);

  const autoBids = [];
  for (const c of P4) if (champByConf.has(c)) autoBids.push(champByConf.get(c));
  for (const t of ranked) {
    if (G6.includes(t.conf)) { autoBids.push(t); break; }
  }

  const autoBidIds = new Set(autoBids.map(t => t.id));
  const atLarges = ranked.filter(t => !autoBidIds.has(t.id)).slice(0, 7);

  const field = [...autoBids, ...atLarges];
  field.sort((a, b) => rankings.indexOf(a.id) - rankings.indexOf(b.id));
  const seeds = field.slice(0, 12);
  while (seeds.length < 12) seeds.push(null);

  return { seeds, autoBidIds };
}

// R1[0]=5v12, R1[1]=6v11, R1[2]=7v10, R1[3]=8v9 (seed indices 4-11).
// QF[0]=#1 vs R1[3], QF[1]=#4 vs R1[0], QF[2]=#2 vs R1[2], QF[3]=#3 vs R1[1].
// SF[0]=QF[0] vs QF[1] (top half), SF[1]=QF[2] vs QF[3] (bottom half).
const R1_PAIRS = [[4, 11], [5, 10], [6, 9], [7, 8]];
const QF_DEPS  = [{ seedIdx: 0, r1: 3 }, { seedIdx: 3, r1: 0 }, { seedIdx: 1, r1: 2 }, { seedIdx: 2, r1: 1 }];

function pruneAdvancement(seeds) {
  for (let i = 0; i < 4; i++) {
    const valid = new Set(R1_PAIRS[i].map(idx => seeds[idx] && seeds[idx].id).filter(Boolean));
    if (advancement.r1[i] && !valid.has(advancement.r1[i])) advancement.r1[i] = null;
  }
  for (let i = 0; i < 4; i++) {
    const valid = new Set();
    if (seeds[QF_DEPS[i].seedIdx]) valid.add(seeds[QF_DEPS[i].seedIdx].id);
    if (advancement.r1[QF_DEPS[i].r1]) valid.add(advancement.r1[QF_DEPS[i].r1]);
    if (advancement.qf[i] && !valid.has(advancement.qf[i])) advancement.qf[i] = null;
  }
  for (let i = 0; i < 2; i++) {
    const valid = new Set([advancement.qf[i*2], advancement.qf[i*2+1]].filter(Boolean));
    if (advancement.sf[i] && !valid.has(advancement.sf[i])) advancement.sf[i] = null;
  }
  const champValid = new Set(advancement.sf.filter(Boolean));
  if (advancement.champ[0] && !champValid.has(advancement.champ[0])) advancement.champ[0] = null;
}

function setWinner(round, idx, teamId) {
  if (advancement[round][idx] === teamId) advancement[round][idx] = null;
  else advancement[round][idx] = teamId;
  pruneAdvancement(buildBracket().seeds);
  saveAdvancement();
  renderBracket();
}

function buildSlot(team, seedNum, isWinner, autoBidIds, onClick) {
  const slot = document.createElement("div");
  slot.className = "matchup-slot" + (isWinner ? " winner" : "");
  if (!team) {
    slot.classList.add("empty");
    slot.innerHTML = `<span class="seed"></span><span class="mname">TBD</span>`;
    return slot;
  }
  const seedSpan = document.createElement("span");
  seedSpan.className = "seed";
  seedSpan.textContent = seedNum != null ? seedNum : "";

  const img = document.createElement("img");
  img.className = "mini";
  img.src = logoUrl(team);
  img.alt = "";
  img.loading = "lazy";
  img.onerror = () => {
    const fb = document.createElement("div");
    fb.className = "mini-fallback";
    fb.textContent = team.abbr;
    img.replaceWith(fb);
  };

  const name = document.createElement("span");
  name.className = "mname";
  name.textContent = team.name;

  slot.appendChild(seedSpan);
  slot.appendChild(img);
  slot.appendChild(name);

  if (autoBidIds && autoBidIds.has(team.id)) {
    const badge = document.createElement("span");
    badge.className = "badge";
    badge.title = "Conference champion (auto-bid)";
    badge.textContent = "CC";
    slot.appendChild(badge);
  }
  if (onClick) slot.addEventListener("click", onClick);
  return slot;
}

function makeRoundLabel(text) {
  const el = document.createElement("div");
  el.className = "round-label";
  el.textContent = text;
  return el;
}

function seedNumOf(seeds, team) {
  if (!team) return null;
  const i = seeds.findIndex(s => s && s.id === team.id);
  return i >= 0 ? i + 1 : null;
}

function renderBracket() {
  const { seeds, autoBidIds } = buildBracket();
  pruneAdvancement(seeds);
  saveAdvancement();

  const container = document.getElementById("bracket");
  if (!container) return;
  container.innerHTML = "";

  function renderMatchup(teamA, seedA, teamB, seedB, round, idx) {
    const m = document.createElement("div");
    m.className = "matchup";
    const winnerId = advancement[round][idx];
    m.appendChild(buildSlot(teamA, seedA, !!(teamA && winnerId === teamA.id), autoBidIds,
      teamA ? () => setWinner(round, idx, teamA.id) : null));
    m.appendChild(buildSlot(teamB, seedB, !!(teamB && winnerId === teamB.id), autoBidIds,
      teamB ? () => setWinner(round, idx, teamB.id) : null));
    return m;
  }

  // First Round
  const r1 = document.createElement("div");
  r1.className = "round";
  r1.appendChild(makeRoundLabel("First Round"));
  // Visual order top→bottom aligns with bracket flow
  const r1Order = [
    { idx: 3, a: 7, b: 8,  sA: 8, sB: 9  }, // 8 vs 9
    { idx: 0, a: 4, b: 11, sA: 5, sB: 12 }, // 5 vs 12
    { idx: 2, a: 6, b: 9,  sA: 7, sB: 10 }, // 7 vs 10
    { idx: 1, a: 5, b: 10, sA: 6, sB: 11 }, // 6 vs 11
  ];
  for (const m of r1Order) r1.appendChild(renderMatchup(seeds[m.a], m.sA, seeds[m.b], m.sB, "r1", m.idx));
  container.appendChild(r1);

  // Quarterfinals
  const qf = document.createElement("div");
  qf.className = "round";
  qf.appendChild(makeRoundLabel("Quarterfinals"));
  const qfOrder = [
    { idx: 0, seedIdx: 0, sA: 1, fromR1: 3 }, // 1 vs r1[3]
    { idx: 1, seedIdx: 3, sA: 4, fromR1: 0 }, // 4 vs r1[0]
    { idx: 2, seedIdx: 1, sA: 2, fromR1: 2 }, // 2 vs r1[2]
    { idx: 3, seedIdx: 2, sA: 3, fromR1: 1 }, // 3 vs r1[1]
  ];
  for (const m of qfOrder) {
    const teamA = seeds[m.seedIdx];
    const r1Win = advancement.r1[m.fromR1];
    const teamB = r1Win ? teamMap.get(r1Win) : null;
    qf.appendChild(renderMatchup(teamA, m.sA, teamB, seedNumOf(seeds, teamB), "qf", m.idx));
  }
  container.appendChild(qf);

  // Semifinals
  const sf = document.createElement("div");
  sf.className = "round";
  sf.appendChild(makeRoundLabel("Semifinals"));
  for (let i = 0; i < 2; i++) {
    const wA = advancement.qf[i*2], wB = advancement.qf[i*2+1];
    const tA = wA ? teamMap.get(wA) : null;
    const tB = wB ? teamMap.get(wB) : null;
    sf.appendChild(renderMatchup(tA, seedNumOf(seeds, tA), tB, seedNumOf(seeds, tB), "sf", i));
  }
  container.appendChild(sf);

  // Championship
  const fc = document.createElement("div");
  fc.className = "round";
  fc.appendChild(makeRoundLabel("National Title"));
  const cA = advancement.sf[0] ? teamMap.get(advancement.sf[0]) : null;
  const cB = advancement.sf[1] ? teamMap.get(advancement.sf[1]) : null;
  fc.appendChild(renderMatchup(cA, seedNumOf(seeds, cA), cB, seedNumOf(seeds, cB), "champ", 0));
  if (advancement.champ[0]) {
    const t = teamMap.get(advancement.champ[0]);
    if (t) {
      const trophy = document.createElement("div");
      trophy.className = "trophy";
      trophy.textContent = "🏆 " + t.name;
      fc.appendChild(trophy);
    }
  }
  container.appendChild(fc);
}

function titleText() {
  return userName.trim()
    ? `${userName.trim()}'s College Football Top 25`
    : "College Football Top 25 Builder";
}

function updateTitle() {
  document.getElementById("title").textContent = titleText();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function loadLogo(team) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = logoUrl(team);
  });
}

async function exportImage() {
  const btn = document.getElementById("share");
  const original = btn.textContent;
  btn.textContent = "Rendering…";
  btn.disabled = true;
  try {
    const W = 1080, H = 608;
    const canvas = document.createElement("canvas");
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#0d1117";
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = "#e6edf3";
    ctx.font = "700 26px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    ctx.textBaseline = "middle";
    ctx.textAlign = "left";
    ctx.fillText(titleText(), 24, 38);

    ctx.fillStyle = "#8b949e";
    ctx.font = "500 12px -apple-system, BlinkMacSystemFont, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(new Date().toLocaleDateString(), W - 24, 38);

    ctx.fillStyle = "#f85149";
    ctx.fillRect(24, 64, 64, 3);

    const padX = 24;
    const gridTop = 84;
    const gridBottom = H - 20;
    const cols = 5, rows = 5, gap = 8;
    const cellW = (W - padX * 2 - gap * (cols - 1)) / cols;
    const cellH = (gridBottom - gridTop - gap * (rows - 1)) / rows;

    const logos = await Promise.all(rankings.map(id => id ? loadLogo(teamMap.get(id)) : null));

    for (let i = 0; i < 25; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = padX + col * (cellW + gap);
      const y = gridTop + row * (cellH + gap);

      ctx.fillStyle = "#161b22";
      ctx.strokeStyle = "#30363d";
      ctx.lineWidth = 1;
      roundRect(ctx, x, y, cellW, cellH, 8);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#f85149";
      ctx.font = "700 18px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.textBaseline = "top";
      ctx.textAlign = "left";
      ctx.fillText(String(i + 1), x + 10, y + 8);

      const teamId = rankings[i];
      if (!teamId) continue;
      const team = teamMap.get(teamId);

      const logoSize = 52;
      const logoX = x + cellW / 2 - logoSize / 2;
      const logoY = y + 18;
      const logo = logos[i];
      if (logo) {
        ctx.drawImage(logo, logoX, logoY, logoSize, logoSize);
      } else {
        ctx.fillStyle = "#30363d";
        roundRect(ctx, logoX, logoY, logoSize, logoSize, 6);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = "700 13px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(team.abbr, logoX + logoSize / 2, logoY + logoSize / 2);
      }

      ctx.fillStyle = "#e6edf3";
      ctx.font = "600 12px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      let name = team.name;
      const maxWidth = cellW - 12;
      if (ctx.measureText(name).width > maxWidth) {
        while (name.length > 1 && ctx.measureText(name + "…").width > maxWidth) name = name.slice(0, -1);
        name += "…";
      }
      ctx.fillText(name, x + cellW / 2, logoY + logoSize + 6);
    }

    await new Promise((resolve) => {
      canvas.toBlob((blob) => {
        if (!blob) { alert("Export failed"); resolve(); return; }
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "cfb-top25.png";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        resolve();
      }, "image/png");
    });
  } finally {
    btn.textContent = original;
    btn.disabled = false;
  }
}

function init() {
  load();
  updateTitle();
  const nameInput = document.getElementById("name");
  nameInput.value = userName;
  nameInput.addEventListener("input", () => {
    userName = nameInput.value;
    updateTitle();
  });
  renderRankings();
  renderPool();

  const pool = document.getElementById("pool");
  pool.addEventListener("dragover", (e) => { e.preventDefault(); pool.classList.add("drag-over"); });
  pool.addEventListener("dragleave", (e) => { if (e.target === pool) pool.classList.remove("drag-over"); });
  pool.addEventListener("drop", onPoolDrop);

  document.getElementById("search").addEventListener("input", renderPool);

  document.getElementById("reset").addEventListener("click", () => {
    if (!confirm("Clear your Top 25?")) return;
    rankings = new Array(SLOTS).fill(null);
    save();
    renderRankings();
    renderPool();
  });

  document.getElementById("share").addEventListener("click", exportImage);

  document.getElementById("copy").addEventListener("click", async () => {
    const lines = rankings.map((id, i) => {
      const t = id ? teamMap.get(id) : null;
      return `${i + 1}. ${t ? t.name : "—"}`;
    }).join("\n");
    try {
      await navigator.clipboard.writeText(lines);
      const btn = document.getElementById("copy");
      const original = btn.textContent;
      btn.textContent = "Copied!";
      setTimeout(() => { btn.textContent = original; }, 1200);
    } catch {
      alert(lines);
    }
  });
}
init();
</script>
